# ============================================================
# Tema Gym Manager \u2014 FlatLaf Modern Blue
# Estilo: clean, iOS-like, leve e profissional
# ============================================================

# --- Paleta base ---
@base100        = #f5f7fb
@base200        = #e9eef5
@base300        = #d7dee8
@base400        = #b8c4d6
@baseContent    = #111827

@primary        = #0a84ff
@primaryHover   = #006fe8
@primaryPressed = #005ec7
@primaryContent = #ffffff

@secondary      = #ff453a
@secondaryHover = #e03b31
@secondaryContent = #ffffff

@accent         = #1f2937
@accentContent  = #ffffff

@neutral        = #ffffff
@neutralSoft    = #f9fafb
@neutralContent = #111827

@info           = #5ac8fa
@success        = #22c55e
@warning        = #f59e0b
@error          = #ef4444

@shadow         = #00000018
@disabledForeground = #94a3b8

# --- Aliases internos ---
@background           = @base100
@foreground           = @baseContent
@accentColor          = @primary
@selectionBackground  = #dbeafe
@selectionForeground  = @baseContent

# --- Globais ---
Component.arc                     = 12
Component.borderWidth             = 1
Component.focusColor              = @primary
Component.focusWidth              = 2
Component.innerFocusWidth         = 0
Component.error.borderColor       = @error
Component.warning.borderColor     = @warning

# --- Pain\u00e9is e janelas ---
Panel.background                  = @background
RootPane.background               = @background
SplitPane.background              = @background
SplitPane.dividerSize             = 6
TabbedPane.background             = @background
TabbedPane.foreground             = @foreground
TabbedPane.selectedBackground     = @neutral
TabbedPane.focusColor             = @primary
TabbedPane.hoverColor             = @base200
TabbedPane.underlineColor         = @primary
TabbedPane.contentAreaColor       = @background
TabbedPane.tabArc                 = 10

# --- Labels ---
Label.foreground                  = @foreground
Label.disabledForeground          = @disabledForeground

# --- Bot\u00f5es ---
Button.background                 = @neutral
Button.foreground                 = @foreground
Button.hoverBackground            = @base200
Button.pressedBackground          = @base300
Button.focusedBackground          = @base200
Button.borderColor                = @base300
Button.focusedBorderColor         = @primary
Button.disabledBackground         = @base200
Button.disabledForeground         = @disabledForeground
Button.disabledBorderColor        = @base300
Button.arc                        = 12
Button.borderWidth                = 1

# bot\u00e3o prim\u00e1rio
Button.default.background         = @primary
Button.default.foreground         = @primaryContent
Button.default.hoverBackground    = @primaryHover
Button.default.pressedBackground  = @primaryPressed
Button.default.borderColor        = @primary
Button.default.focusedBorderColor = @primary

ToggleButton.background           = @neutral
ToggleButton.foreground           = @foreground
ToggleButton.hoverBackground      = @base200
ToggleButton.pressedBackground    = @base300
ToggleButton.selectedBackground   = @primary
ToggleButton.selectedForeground   = @primaryContent
ToggleButton.borderColor          = @base300
ToggleButton.arc                  = 12

# --- Campos de texto ---
TextField.background              = @neutral
TextField.foreground              = @neutralContent
TextField.caretForeground         = @neutralContent
TextField.selectionBackground     = @selectionBackground
TextField.selectionForeground     = @selectionForeground
TextField.placeholderForeground   = #94a3b8
TextField.borderColor             = @base300
TextField.focusedBorderColor      = @primary
TextField.arc                     = 12

TextArea.background               = @neutral
TextArea.foreground               = @neutralContent
TextArea.caretForeground          = @neutralContent
TextArea.selectionBackground      = @selectionBackground
TextArea.selectionForeground      = @selectionForeground
TextArea.borderColor              = @base300

FormattedTextField.background          = @neutral
FormattedTextField.foreground          = @neutralContent
FormattedTextField.selectionBackground = @selectionBackground
FormattedTextField.selectionForeground = @selectionForeground
FormattedTextField.borderColor         = @base300
FormattedTextField.focusedBorderColor  = @primary

PasswordField.background          = @neutral
PasswordField.foreground          = @neutralContent
PasswordField.borderColor         = @base300
PasswordField.focusedBorderColor  = @primary

# --- ComboBox ---
ComboBox.background               = @neutral
ComboBox.foreground               = @neutralContent
ComboBox.selectionBackground      = @selectionBackground
ComboBox.selectionForeground      = @selectionForeground
ComboBox.buttonBackground         = @neutral
ComboBox.buttonEditableBackground = @neutral
ComboBox.borderColor              = @base300
ComboBox.focusedBorderColor       = @primary
ComboBox.arc                      = 12

# --- Spinner ---
Spinner.background                = @neutral
Spinner.foreground                = @neutralContent
Spinner.borderColor               = @base300
Spinner.focusedBorderColor        = @primary
Spinner.arc                       = 12

# --- CheckBox ---
CheckBox.foreground               = @foreground
CheckBox.icon.background          = @neutral
CheckBox.icon.borderColor         = @base400
CheckBox.icon.focusedBorderColor  = @primary
CheckBox.icon.hoverBorderColor    = @primary
CheckBox.icon.selectedBackground  = @neutral
CheckBox.icon.selectedBorderColor = @primary
CheckBox.icon.checkmarkColor      = @primaryContent
CheckBox.icon.disabledBackground  = @base200
CheckBox.icon.disabledBorderColor = @base300
CheckBox.icon.disabledCheckmarkColor = @disabledForeground
CheckBox.icon.arc                 = 5

# --- RadioButton ---
RadioButton.foreground                = @foreground
RadioButton.icon.background           = @neutral
RadioButton.icon.borderColor          = @base400
RadioButton.icon.focusedBorderColor   = @primary
RadioButton.icon.hoverBorderColor     = @primary
RadioButton.icon.selectedBackground   = @primary
RadioButton.icon.selectedBorderColor  = @primary
RadioButton.icon.checkmarkColor       = @primaryContent

# --- Listas ---
List.background                   = @neutral
List.foreground                   = @neutralContent
List.selectionBackground          = @selectionBackground
List.selectionForeground          = @selectionForeground

# --- Tabelas ---
Table.background                  = @neutral
Table.foreground                  = @neutralContent
Table.selectionBackground         = @selectionBackground
Table.selectionForeground         = @selectionForeground
Table.alternateRowColor           = @neutralSoft
Table.gridColor                   = @base200
Table.cellFocusColor              = @primary
Table.cellNoFocusBorder           = 0,8,0,8
Table.showHorizontalLines         = true
Table.showVerticalLines           = false
Table.rowHeight                   = 34

TableHeader.background            = @neutral
TableHeader.foreground            = @foreground
TableHeader.separatorColor        = @base200
TableHeader.bottomSeparatorColor  = @base300
TableHeader.hoverBackground       = @base200
TableHeader.height                = 36

# --- \u00c1rvores ---
Tree.background                   = @neutral
Tree.foreground                   = @neutralContent
Tree.selectionBackground          = @selectionBackground
Tree.selectionForeground          = @selectionForeground

# --- Scroll ---
ScrollBar.track                   = @background
ScrollBar.thumb                   = @base300
ScrollBar.hoverThumbColor         = @base400
ScrollBar.pressedThumbColor       = @primary
ScrollBar.thumbArc                = 999
ScrollBar.width                   = 10
ScrollPane.background             = @background
ScrollPane.borderColor            = @base200

# --- ProgressBar ---
ProgressBar.background            = @base200
ProgressBar.foreground            = @primary
ProgressBar.selectionForeground   = @primaryContent
ProgressBar.selectionBackground   = @primary
ProgressBar.arc                   = 999

# --- Slider ---
Slider.trackColor                 = @base300
Slider.thumbColor                 = @primary
Slider.focusedThumbBorderColor    = @primary
Slider.hoverThumbColor            = @primaryHover

# --- Menus ---
MenuBar.background                = @neutral
MenuBar.foreground                = @foreground
MenuBar.borderColor               = @base200

Menu.background                   = @neutral
Menu.foreground                   = @foreground
Menu.selectionBackground          = @selectionBackground
Menu.selectionForeground          = @foreground

MenuItem.background               = @neutral
MenuItem.foreground               = @foreground
MenuItem.selectionBackground      = @selectionBackground
MenuItem.selectionForeground      = @foreground
MenuItem.acceleratorForeground    = #64748b
MenuItem.acceleratorSelectionForeground = @foreground

CheckBoxMenuItem.selectionBackground    = @selectionBackground
CheckBoxMenuItem.selectionForeground    = @foreground
RadioButtonMenuItem.selectionBackground = @selectionBackground
RadioButtonMenuItem.selectionForeground = @foreground

PopupMenu.background              = @neutral
PopupMenu.foreground              = @foreground
PopupMenu.borderColor             = @base200
Separator.foreground              = @base200

# --- ToolBar ---
ToolBar.background                = @background
ToolBar.foreground                = @foreground
ToolBar.borderColor               = @base200

# --- ToolTip ---
ToolTip.background                = #111827
ToolTip.foreground                = #ffffff

# --- TitleBar ---
TitleBar.background               = @neutral
TitleBar.foreground               = @foreground
TitleBar.inactiveBackground       = @base100
TitleBar.inactiveForeground       = @disabledForeground
TitleBar.buttonHoverBackground    = @base200
TitleBar.buttonPressedBackground  = @base300
TitleBar.closeHoverBackground     = @secondary
TitleBar.closeHoverForeground     = #ffffff
TitleBar.closePressedBackground   = @secondaryHover
TitleBar.closePressedForeground   = #ffffff

# --- InternalFrame ---
InternalFrame.activeTitleBackground   = @primary
InternalFrame.activeTitleForeground   = @primaryContent
InternalFrame.inactiveTitleBackground = @neutral
InternalFrame.inactiveTitleForeground = @foreground
Desktop.background                    = @background